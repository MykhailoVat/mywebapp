
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net

  app:
    build: .
    depends_on:
      - db
    volumes:
    - ./docker_configs/config.json:/etc/mywebapp/config.json
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://${APP_HOST_DOCKER}:${APP_PORT}/health/alive" ]
      interval: 5s
      timeout: 2s
      retries: 10
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker_configs/mywebapp.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net: